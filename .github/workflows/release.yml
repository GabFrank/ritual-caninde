name: Release & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

# semantic-release necesita escribir tags/commits/releases; el deploy sólo lee.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # A nivel job para poder usarlo en el `if` del deploy (no se pueden leer secrets en `if`).
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint
      - name: Test (vitest)
        run: npm test

      - name: Semantic Release (version + changelog + GitHub release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # El build va DESPUÉS del release para incrustar en el bundle la versión recién
      # publicada (semantic-release actualiza package.json en disco durante su corrida).
      - name: Build
        run: npm run build
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID }}
          VITE_YOUTUBE_CLIENT_ID: ${{ secrets.VITE_YOUTUBE_CLIENT_ID }}
          VITE_OAUTH_REDIRECT_URI: ${{ secrets.VITE_OAUTH_REDIRECT_URI }}

      - name: Deploy to Firebase Hosting (live)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: franco-control
          channelId: live

      # Publica las reglas de Firestore en la BASE CON NOMBRE (ai-studio-...) vía la API REST
      # de Firebase Rules. firebase-tools ignora el campo `database` y publica en (default);
      # acá apuntamos explícitamente al release `cloud.firestore/<database>`.
      - name: Deploy Firestore rules (named DB)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        env:
          PROJECT: franco-control
          DB: ai-studio-44008411-4d7f-44ef-a0d8-414d9fdceb4e
        run: |
          set -euo pipefail
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa.json" --quiet
          TOKEN=$(gcloud auth print-access-token)
          API="https://firebaserules.googleapis.com/v1/projects/$PROJECT"

          # 1) Crear un ruleset desde firestore.rules
          CONTENT=$(jq -Rs . < firestore.rules)
          RS=$(curl -fsS -X POST "$API/rulesets" \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d "{\"source\":{\"files\":[{\"name\":\"firestore.rules\",\"content\":$CONTENT}]}}")
          RS_NAME=$(echo "$RS" | jq -r .name)
          echo "Ruleset creado: $RS_NAME"

          # 2) Apuntar el release de la base con nombre a ese ruleset
          REL="cloud.firestore/$DB"
          REL_ENC="cloud.firestore%2F$DB"
          BODY="{\"release\":{\"name\":\"projects/$PROJECT/releases/$REL\",\"rulesetName\":\"$RS_NAME\"}}"
          CODE=$(curl -s -o "$RUNNER_TEMP/rel.json" -w "%{http_code}" -X PATCH \
            "$API/releases/$REL_ENC" \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "$BODY")
          echo "PATCH release -> HTTP $CODE"; cat "$RUNNER_TEMP/rel.json"; echo
          if [ "$CODE" != "200" ]; then
            echo "PATCH no aplicó; intentando crear el release..."
            curl -fsS -X POST "$API/releases" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d "{\"name\":\"projects/$PROJECT/releases/$REL\",\"rulesetName\":\"$RS_NAME\"}"
            echo
          fi
          echo "Reglas publicadas en la base $DB"

          # 3) Verificación (solo lectura). No debe hacer fallar el deploy.
          set +e
          echo "===== DIAGNÓSTICO (solo lectura) ====="
          echo "--- Bases de datos del proyecto ---"
          curl -fsS "https://firestore.googleapis.com/v1/projects/$PROJECT/databases" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.databases[]?.name' || true
          echo "--- Releases de reglas ---"
          curl -fsS "$API/releases" -H "Authorization: Bearer $TOKEN" \
            | jq -r '.releases[]? | "\(.name) -> \(.rulesetName)"' || true
          echo "--- Reglas ACTIVAS en la base $DB ---"
          ENF=$(curl -fsS "$API/releases/$REL_ENC" -H "Authorization: Bearer $TOKEN" | jq -r .rulesetName)
          echo "ruleset activo: $ENF"
          curl -fsS "https://firebaserules.googleapis.com/v1/$ENF" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.source.files[]?.content' || true
          echo "===== FIN DIAGNÓSTICO ====="
