name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (tsc --noEmit)
        run: npm run lint
      - name: Test (vitest)
        run: npm test
      - name: Build
        run: npm run build
